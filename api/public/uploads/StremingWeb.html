<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamVibe MAX | Universal Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg: #09090b; --surface: #18181b; --surface-hover: #27272a; 
            --primary: #6366f1; --primary-hover: #4f46e5; 
            --accent: #f43f5e; --text-main: #fafafa; --text-dim: #a1a1aa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent;}
        body { background-color: var(--bg); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header & Input */
        .app-bar { padding: 20px 20px 10px; z-index: 10; }
        .brand { font-size: 1.5rem; font-weight: 800; margin-bottom: 15px; color: var(--primary); display: flex; align-items: center; gap: 8px;}
        .brand i { color: var(--accent); }
        .input-wrapper { display: flex; gap: 8px; background: var(--surface); padding: 6px 6px 6px 15px; border-radius: 99px; border: 1px solid #27272a; align-items: center; transition: border 0.3s;}
        .input-wrapper:focus-within { border-color: var(--primary); }
        .input-wrapper i { color: var(--text-dim); font-size: 1.2rem; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 10px 5px; font-size: 0.95rem; outline: none; }
        .btn-play { background: var(--primary); color: white; border: none; padding: 0 20px; border-radius: 99px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 5px; height: 100%; transition: background 0.3s;}
        .btn-play:hover { background: var(--primary-hover); }

        /* Content & Player */
        .content-scroll { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        
        .player-wrapper { background: var(--surface); border-radius: 20px; border: 1px solid #27272a; margin-bottom: 25px; overflow: hidden; }
        .player-card {
            width: 100%; aspect-ratio: 16/9; background: #000; position: relative;
        }
        
        /* Modifikasi CSS Fullscreen agar memenuhi layar dengan benar */
        .player-card:fullscreen { aspect-ratio: auto; width: 100vw; height: 100vh; border-radius: 0; border: none;}
        .player-card:-webkit-full-screen { aspect-ratio: auto; width: 100vw; height: 100vh; border-radius: 0; border: none;}
        
        iframe, video { width: 100%; height: 100%; border: none; outline: none; }

        /* Fallback UI */
        .fallback-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center; padding: 20px;
            display: none; z-index: 5; backdrop-filter: blur(5px);
        }
        .btn-external {
            margin-top: 15px; background: var(--accent); color: white; border: none;
            padding: 10px 20px; border-radius: 10px; font-weight: bold; font-size: 0.9rem; cursor: pointer;
        }

        /* Player Info Bar */
        .player-info { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #27272a;}
        .info-text { flex: 1; overflow: hidden; padding-right: 10px; }
        .info-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .info-url { font-size: 0.75rem; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        
        .action-btns { display: flex; gap: 10px; }
        .icon-btn {
            background: #27272a; border: 1px solid #3f3f46; color: white;
            width: 42px; height: 42px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: all 0.2s; font-size: 1.3rem; flex-shrink: 0;
        }
        .icon-btn:hover { background: #3f3f46; transform: scale(1.05); }
        .icon-btn.active-fav { color: var(--accent); background: rgba(244, 63, 94, 0.15); border-color: rgba(244, 63, 94, 0.3); }

        /* Tabs & Lists */
        .tabs { display: flex; gap: 20px; border-bottom: 1px solid #27272a; margin-bottom: 15px; }
        .tab-btn {
            background: transparent; border: none; color: var(--text-dim); padding: 10px 0;
            font-size: 0.95rem; font-weight: 600; cursor: pointer; position: relative; transition: color 0.3s;
        }
        .tab-btn.active { color: var(--text-main); }
        .tab-btn.active::after {
            content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px;
            background: var(--primary); border-radius: 2px 2px 0 0;
        }

        .list-container { display: flex; flex-direction: column; gap: 10px; }
        .list-item { background: var(--surface); padding: 12px 15px; border-radius: 16px; border: 1px solid #27272a; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: all 0.2s; }
        .list-item:hover { background: var(--surface-hover); border-color: #3f3f46; }
        
        .icon-box { width: 45px; height: 45px; background: #27272a; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 1.5rem; color: var(--text-dim);}
        .item-info { flex: 1; overflow: hidden; }
        .item-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .item-url { font-size: 0.7rem; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 4px;}
        
        .delete-btn { background: transparent; border: none; color: var(--text-dim); cursor: pointer; padding: 8px; font-size: 1.2rem; border-radius: 8px;}
        .delete-btn:hover { color: var(--accent); background: rgba(244, 63, 94, 0.1); }

        .empty-state { text-align: center; padding: 30px; color: var(--text-dim); }
        .empty-state i { font-size: 3rem; margin-bottom: 10px; opacity: 0.5; }

        @media (max-width: 480px) {
            .app-bar { padding: 15px 15px 5px; }
            .content-scroll { padding: 15px; }
            .input-wrapper { border-radius: 16px; flex-wrap: wrap; padding: 8px;}
            .btn-play { width: 100%; padding: 12px; justify-content: center; border-radius: 12px; margin-top: 5px;}
            input { width: 100%; }
            .input-wrapper i { display: none; }
        }
    </style>
</head>
<body>

    <header class="app-bar">
        <div class="brand"><i class='bx bxs-bolt-circle'></i> StreamVibe MAX</div>
        <div class="input-wrapper">
            <i class='bx bx-link'></i>
            <input type="text" id="vUrl" placeholder="Link YouTube, MP4, M3U8, atau Web..." onkeypress="if(event.key === 'Enter') handleStream()">
            <button class="btn-play" onclick="handleStream()"><i class='bx bx-play'></i> PLAY</button>
        </div>
    </header>

    <main class="content-scroll">
        
        <div class="player-wrapper">
            <div class="player-card" id="playerContainer">
                <div id="playerSpace" style="height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim);">
                    <i class='bx bx-movie-play' style="font-size: 3.5rem; margin-bottom: 10px; opacity: 0.4;"></i>
                    <span style="font-weight: 600; font-size: 0.9rem;">Player Ready</span>
                </div>
                
                <div class="fallback-overlay" id="fallbackUI">
                    <i class='bx bx-block' style="font-size: 2.5rem; color: var(--accent); margin-bottom: 10px;"></i>
                    <p style="color: white; font-weight: bold; margin-bottom: 5px;">Server Memblokir Pemutaran</p>
                    <p style="color: var(--text-dim); font-size: 0.75rem; max-width: 80%;">Website ini tidak mengizinkan videonya diputar di dalam aplikasi lain (CORS/X-Frame).</p>
                    <button class="btn-external" onclick="openExternal()"><i class='bx bx-link-external'></i> Buka di Tab Baru</button>
                </div>
            </div>

            <div class="player-info">
                <div class="info-text">
                    <div class="info-title" id="dispTitle">Belum ada media</div>
                    <div class="info-url" id="dispUrl">Tempelkan link di atas untuk memulai</div>
                </div>
                
                <div class="action-btns">
                    <button class="icon-btn" onclick="toggleFullScreen()" title="Layar Penuh">
                        <i class='bx bx-fullscreen' id="fsIcon"></i>
                    </button>
                    <button class="icon-btn" id="favBtn" onclick="toggleFavorite()" title="Simpan ke Favorit">
                        <i class='bx bx-heart'></i>
                    </button>
                </div>

            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('history')" id="tab-history">Riwayat</button>
            <button class="tab-btn" onclick="switchTab('favorites')" id="tab-favorites">Favorit</button>
        </div>

        <div class="list-container" id="contentArea">
            </div>
    </main>

    <script>
        // State Management
        let historyData = JSON.parse(localStorage.getItem('max_hist')) || [];
        let favoriteData = JSON.parse(localStorage.getItem('max_fav')) || [];
        let currentVideoObj = null;
        let currentTab = 'history';
        let fallbackTimer = null;

        // Inisialisasi awal UI
        renderList();

        function handleStream(passedUrl = null) {
            const urlInput = document.getElementById('vUrl');
            const url = passedUrl || urlInput.value.trim();
            const space = document.getElementById('playerSpace');
            const fallback = document.getElementById('fallbackUI');
            
            if (!url) return alert("Silakan masukkan link terlebih dahulu!");

            // Reset UI & Timers
            fallback.style.display = 'none';
            if (fallbackTimer) clearTimeout(fallbackTimer);
            if(!passedUrl) urlInput.value = "";

            let title = "Unknown Source";
            let typeIcon = "bx-link-external";

            // 1. Cek YouTube
            const ytMatch = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/);
            
            if (ytMatch) {
                title = "YouTube Stream";
                typeIcon = "bxl-youtube";
                // Tambahkan allow="fullscreen" agar fungsi layar penuh internal Iframe YouTube tetap jalan
                space.innerHTML = `<iframe src="https://www.youtube.com/embed/${ytMatch[1]}?autoplay=1" allow="fullscreen; autoplay; encrypted-media" allowfullscreen></iframe>`;
            } 
            // 2. Cek Format M3U8 (HLS)
            else if (url.includes('.m3u8')) {
                title = "HLS Live Stream (.m3u8)";
                typeIcon = "bx-broadcast";
                space.innerHTML = `<video id="videoElement" controls autoplay style="width:100%; height:100%;"></video>`;
                const video = document.getElementById('videoElement');
                
                if (Hls.isSupported()) {
                    const hls = new Hls();
                    hls.loadSource(url);
                    hls.attachMedia(video);
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = url; 
                }
            }
            // 3. Cek Format MP4 / WebM
            else if (url.match(/\.(mp4|webm|ogg)$/i)) {
                title = "Direct Video File";
                typeIcon = "bx-file";
                space.innerHTML = `<video controls autoplay><source src="${url}"></video>`;
            } 
            // 4. Web / Embed Link biasa
            else {
                title = "Web / Embed Link";
                typeIcon = "bx-globe";
                space.innerHTML = `<iframe src="${url}" allow="fullscreen" allowfullscreen></iframe>`;
                
                // Fallback timeout untuk iframe yang diblokir CORS/X-Frame
                fallbackTimer = setTimeout(() => {
                    fallback.style.display = 'flex';
                }, 3500);
            }

            // Update UI Player Info
            document.getElementById('dispTitle').innerText = title;
            document.getElementById('dispUrl').innerText = url;
            document.getElementById('vUrl').value = url;

            // Update Data
            currentVideoObj = { url, title, icon: typeIcon, id: Date.now() };
            saveHistory(currentVideoObj);
            checkFavoriteStatus();
        }

        // --- Fitur Fullscreen ---
        function toggleFullScreen() {
            const player = document.getElementById('playerContainer');
            const fsIcon = document.getElementById('fsIcon');

            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                // Masuk Fullscreen
                if (player.requestFullscreen) {
                    player.requestFullscreen();
                } else if (player.webkitRequestFullscreen) { /* Safari */
                    player.webkitRequestFullscreen();
                }
            } else {
                // Keluar Fullscreen
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) { /* Safari */
                    document.webkitExitFullscreen();
                }
            }
        }

        // Listener jika user keluar fullscreen pakai tombol ESC di keyboard
        document.addEventListener('fullscreenchange', updateFsIcon);
        document.addEventListener('webkitfullscreenchange', updateFsIcon);

        function updateFsIcon() {
            const fsIcon = document.getElementById('fsIcon');
            if (document.fullscreenElement || document.webkitFullscreenElement) {
                fsIcon.className = 'bx bx-exit-fullscreen'; // Ubah jadi ikon perkecil layar
            } else {
                fsIcon.className = 'bx bx-fullscreen'; // Kembalikan ke ikon perbesar
            }
        }

        function openExternal() {
            if (currentVideoObj && currentVideoObj.url) {
                window.open(currentVideoObj.url, '_blank');
            }
        }

        // --- Data & Storage System ---
        function saveHistory(videoObj) {
            historyData = historyData.filter(x => x.url !== videoObj.url);
            historyData.unshift(videoObj);
            if(historyData.length > 50) historyData.pop(); 
            localStorage.setItem('max_hist', JSON.stringify(historyData));
            if(currentTab === 'history') renderList();
        }

        function toggleFavorite() {
            if (!currentVideoObj) return alert("Putar video terlebih dahulu!");

            const isFav = favoriteData.some(v => v.url === currentVideoObj.url);
            
            if (isFav) {
                favoriteData = favoriteData.filter(v => v.url !== currentVideoObj.url);
            } else {
                favoriteData.unshift(currentVideoObj);
            }

            localStorage.setItem('max_fav', JSON.stringify(favoriteData));
            checkFavoriteStatus();
            if(currentTab === 'favorites') renderList();
        }

        function checkFavoriteStatus() {
            const favBtn = document.getElementById('favBtn');
            if (!currentVideoObj) return;
            
            const isFav = favoriteData.some(v => v.url === currentVideoObj.url);
            if (isFav) {
                favBtn.classList.add('active-fav');
                favBtn.innerHTML = "<i class='bx bxs-heart'></i>";
            } else {
                favBtn.classList.remove('active-fav');
                favBtn.innerHTML = "<i class='bx bx-heart'></i>";
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-history').classList.toggle('active', tab === 'history');
            document.getElementById('tab-favorites').classList.toggle('active', tab === 'favorites');
            renderList();
        }

        function deleteItem(event, url, listType) {
            event.stopPropagation(); // Mencegah klik play saat menghapus
            if (listType === 'history') {
                historyData = historyData.filter(v => v.url !== url);
                localStorage.setItem('max_hist', JSON.stringify(historyData));
            } else {
                favoriteData = favoriteData.filter(v => v.url !== url);
                localStorage.setItem('max_fav', JSON.stringify(favoriteData));
                checkFavoriteStatus();
            }
            renderList();
        }

        function renderList() {
            const container = document.getElementById('contentArea');
            const data = currentTab === 'history' ? historyData : favoriteData;
            container.innerHTML = '';

            if (data.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class='bx bx-folder-open'></i>
                        <p>Daftar ${currentTab === 'history' ? 'riwayat' : 'favorit'} masih kosong.</p>
                    </div>`;
                return;
            }

            container.innerHTML = data.map(item => `
                <div class="list-item" onclick="handleStream('${item.url}')">
                    <div class="icon-box"><i class='bx ${item.icon || 'bx-play'}'></i></div>
                    <div class="item-info">
                        <div class="item-title">${item.title}</div>
                        <div class="item-url"><i class='bx bx-link-alt'></i> ${item.url}</div>
                    </div>
                    <button class="delete-btn" onclick="deleteItem(event, '${item.url}', '${currentTab}')" title="Hapus">
                        <i class='bx bx-trash'></i>
                    </button>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
